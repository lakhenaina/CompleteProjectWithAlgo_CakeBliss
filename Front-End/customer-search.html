<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Results | Cake's Bliss</title>
  <link rel="stylesheet" href="style.css" />

  <script>
    const userId = localStorage.getItem("userId");
    if (!userId) {
      window.location.href = "login.html";
    }

    function logout() {
      localStorage.removeItem("userId");
      window.location.href = "index.html";
    }

    function goToDashboard() {
      window.location.href = "customer-dashboard.html";
    }
  </script>
</head>
<body>
  <nav class="main-navbar">
    <div class="navbar-left">
      <a class="logo-link" href="customer-dashboard.html">
        <div class="logo">🍰 Cake's Bliss</div>
      </a>

      <ul class="nav-links">
        <li><a href="customer-dashboard.html">Home</a></li>
        <li><a href="customer-products.html">Products</a></li>
        <li><a href="customer-orders.html">My Orders</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </div>

    <div class="navbar-right">
      <input type="text" id="search-input" placeholder="Search for products">
      <button id="search-button">🔍</button>
      <a href="cart.html" class="login-button">🛒 Cart</a>
      <button onclick="logout()" class="login-button" style="background-color:#4CAF50; color:white; border:none;">
        Logout
      </button>
    </div>
  </nav>

  <main style="padding: 20px;">
    <div style="margin-bottom: 20px;">
      <button onclick="goToDashboard()" style="background:#c1121f; color:white; border:none; padding:10px 16px; border-radius:6px; cursor:pointer;">
        ← Back to Dashboard
      </button>
    </div>

    <h2>Search Results</h2>
    <div id="search-query-text" style="margin-bottom:15px; color:#666;"></div>
    <div class="products-grid" id="search-results"></div>
  </main>

  <script>
    async function loadSearchResults() {
      const params = new URLSearchParams(window.location.search);
      const query = params.get("query")?.toLowerCase().trim() || "";

      const queryText = document.getElementById("search-query-text");
      const container = document.getElementById("search-results");

      if (!query) {
        container.innerHTML = "<p>Please enter a search query.</p>";
        return;
      }

      queryText.textContent = `Showing results for: "${query}"`;

      try {
        const res = await fetch("http://localhost:3001/products");
        const data = await res.json();
        const products = data.data || [];

        const filtered = products.filter(prod =>
          prod.title.toLowerCase().includes(query) ||
          (prod.description && prod.description.toLowerCase().includes(query))
        );

        container.innerHTML = "";

        if (filtered.length === 0) {
          container.innerHTML = `<p>No products found for "${query}".</p>`;
          return;
        }

        filtered.forEach(prod => {
          container.innerHTML += `
            <div class="product-card">
              <a href="customer-product-details.html?id=${prod._id}" style="text-decoration:none; color:inherit;">
                <img src="${prod.imageUrl}" alt="${prod.title}" />
                <h3>${prod.title}</h3>
                <p>${prod.description || ""}</p>
                <strong>Rs. ${prod.price}</strong>
              </a>
              <button class="cart-icon" onclick="addToCart('${prod._id}')">🛒</button>
            </div>
          `;
        });
      } catch (err) {
        console.error("Search failed", err);
        container.innerHTML = "<p>Failed to load search results.</p>";
      }
    }

    document.getElementById("search-button").addEventListener("click", () => {
      const query = document.getElementById("search-input").value.trim();
      if (query) {
        window.location.href = `search-results.html?query=${encodeURIComponent(query)}`;
      }
    });

    document.getElementById("search-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        const query = document.getElementById("search-input").value.trim();
        if (query) {
          window.location.href = `search-results.html?query=${encodeURIComponent(query)}`;
        }
      }
    });

    function addToCart(productId) {
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");
      cart.push(productId);
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Added to cart!");
    }

    loadSearchResults();
  </script>
</body>
</html>
